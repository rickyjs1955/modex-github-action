name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck + test + dist current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # A JavaScript Action ships its committed bundle. If `src/` changed but
      # `dist/` wasn't rebuilt, fail loudly rather than shipping a stale action.
      - name: dist/ is up to date
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date — run 'npm run build' and commit the result."
            exit 1
          fi
